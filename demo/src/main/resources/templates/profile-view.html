<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${username} + ' - Profile'">Profile</title>
    <link rel="stylesheet" th:href="@{/css/site.css}" href="/css/site.css">
</head>
<body>

<div class="app-shell">
    <nav class="top-nav">
        <a href="/" class="brand">BoardGameBoard</a>

        <div class="nav-links">
            <a href="/dashboard" class="secondary-button">Dashboard</a>
            <a href="/profile" class="secondary-button">My Profile</a>
        </div>
    </nav>

    <main class="dashboard">
        <section class="hero-card">
            <img
                    th:src="${avatar}"
                    alt="Profile picture"
                    style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #7c5cff;"
            >

            <p class="eyebrow" th:text="${role}">USER</p>
            <h1 th:text="${username}">Username</h1>
            <p class="muted" th:text="${bio}">No bio added yet.</p>

            <div class="follow-stats" style="margin-top: 10px;">
                <span class="text-link" th:text="${followerCount} + ' Followers'"></span>
                <span style="margin: 0 10px;">.</span>
                <span class="text-link" th:text="${followingCount} + ' Following'"></span>
            </div>

            <div style="margin-top: 14px; display: flex; gap: 12px;">
                <form th:if="${!isFollowing}" th:action="@{'/profile/' + ${username} + '/follow'}" method="post">
                    <button type="submit" class="primary-button">Follow</button>
                </form>

                <form th:if="${isFollowing}" th:action="@{'/profile/' + ${username} + '/unfollow'}" method="post">
                    <button type="submit" class="secondary-button">Unfollow</button>
                </form>
            </div>

            <div class="profile-lists-section">
                <div>
                    <h3 style="margin: 0; font-size: 1rem">Games Owned</h3>
                    <p class="muted" style="margin: 4px 0" th:if="${ownedList.isEmpty()}">No games added yet.</p>

                    <div class="game-tag-container">
                        <span th:each="game : ${ownedList}" class="game-tag" th:text="${game}">Owned game</span>
                    </div>
                </div>

                <div>
                    <h3 style="margin: 0; font-size: 1rem">Wishlist</h3>
                    <p class="muted" style="margin: 4px 0" th:if="${wishlistList.isEmpty()}">Wishlist is empty.</p>

                    <div class="game-tag-container">
                        <span th:each="game : ${wishlistList}" class="game-tag wishlist-tag" th:text="${game}">Wishlist game</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="grid">
            <div class="feature-card" style="grid-column: span 3;">
                <h2>Posted Reviews</h2>

                <p class="muted" th:if="${reviews.isEmpty()}">No reviews yet.</p>

                <div th:each="review : ${reviews}" class="mock-card" style="margin-bottom: 16px; padding: 18px;">
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <h3 style="margin: 0" th:text="${review.gameTitle}">Game Title</h3>
                        <span class="eyebrow" th:text="${review.rating} + ' / 5'">5 / 5</span>
                    </div>

                    <p style="margin: 10px 0 0" th:text="${review.reviewText}">Review details</p>
                </div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
