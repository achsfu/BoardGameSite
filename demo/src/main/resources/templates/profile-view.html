<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${username} + ' - Profile'">Profile</title>
    <link rel="stylesheet" th:href="@{/css/site.css}" href="/css/site.css">
</head>
<body class="dashboard-body">

<div class="dashboard-shell">
    <nav class="dashboard-nav">
        <a href="/" class="dashboard-brand">BoardGameBoard</a>

        <div class="dashboard-nav-links">
            <a href="/dashboard" th:if="${session.AUTH_USER != null}">Dashboard</a>

            <form class="dashboard-nav-search" action="/profile/search" method="get" th:if="${session.AUTH_USER != null}">
                <button type="button" class="dashboard-nav-search-toggle">Users</button>
                <input id="navUserSearch" name="q" type="search" placeholder="Search users" required>
                <button type="submit">Search</button>
            </form>

            <form class="dashboard-nav-search" action="/games/search" method="get" th:if="${session.AUTH_USER != null}">
                <button type="button" class="dashboard-nav-search-toggle">Games</button>
                <input id="navGameSearch" name="q" type="search" placeholder="Search games" required>
                <button type="submit">Search</button>
            </form>

            <form action="/logout" method="post" th:if="${session.AUTH_USER != null}">
                <button type="submit" class="dashboard-logout-button">Logout</button>
            </form>

            <a href="/login" th:if="${session.AUTH_USER == null}">Sign in</a>
            <a href="/register" th:if="${session.AUTH_USER == null}">Register</a>
        </div>
    </nav>

    <main class="dashboard-page">
        <header class="dashboard-profile-header profile-page-header">
            <div class="dashboard-avatar dashboard-avatar-photo">
                <img
                        th:src="${avatar}"
                        alt="Profile picture"
                        class="dashboard-avatar-image"
                >
            </div>

            <div class="dashboard-profile-copy">
                <div class="dashboard-profile-title-row">
                    <h1 th:text="${username}">Username</h1>
                    <span class="dashboard-role-badge" th:text="${role}">USER</span>
                </div>

                <p th:text="${bio}">No bio added yet.</p>

                <div class="dashboard-profile-links">
                    <span th:text="${followerCount} + ' Followers'"></span>
                    <span th:text="${followingCount} + ' Following'"></span>
                </div>

                <div class="profile-view-follow-actions">
                    <form th:if="${!isFollowing}" th:action="@{'/profile/' + ${username} + '/follow'}" method="post">
                        <button type="submit" class="primary-button">Follow</button>
                    </form>

                    <form th:if="${isFollowing}" th:action="@{'/profile/' + ${username} + '/unfollow'}" method="post">
                        <button type="submit" class="secondary-button">Unfollow</button>
                    </form>
                </div>
            </div>
        </header>

        <nav class="dashboard-tabs" aria-label="Profile navigation">
            <a href="/dashboard">Overview</a>
            <a href="/feed">Activity</a>
            <a th:href="@{'/profile/' + ${username}}" class="active">Profile</a>
            <a href="/sessions">Sessions</a>
        </nav>

        <section class="dashboard-section">
            <div class="dashboard-section-heading">
                <h2>Collection</h2>
            </div>

            <div class="profile-lists-section">
                <div>
                    <h3>Games Owned</h3>
                    <p class="muted" th:if="${ownedList.isEmpty()}">No games added yet.</p>

                    <div class="game-tag-container">
                        <span th:each="game : ${ownedList}" class="game-tag" th:text="${game}">Owned game</span>
                    </div>
                </div>

                <div>
                    <h3>Wishlist</h3>
                    <p class="muted" th:if="${wishlistList.isEmpty()}">Wishlist is empty.</p>

                    <div class="game-tag-container">
                        <span th:each="game : ${wishlistList}" class="game-tag wishlist-tag" th:text="${game}">Wishlist game</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="dashboard-section">
            <div class="dashboard-section-heading">
                <h2>Posted Reviews</h2>
            </div>

            <p class="dashboard-empty-message" th:if="${reviews.isEmpty()}">No reviews yet.</p>

            <div class="dashboard-activity-list">
                <article th:each="review : ${reviews}" class="dashboard-activity-row profile-review-row">
                    <div class="dashboard-activity-icon">★</div>

                    <div class="dashboard-activity-content">
                        <strong th:text="${review.gameTitle}">Game Title</strong>
                        <p th:text="${review.reviewText}">Review details</p>
                    </div>

                    <span class="dashboard-row-arrow profile-review-rating" th:text="${review.rating} + ' / 5'">5 / 5</span>
                </article>
            </div>
        </section>
    </main>
</div>

<script src="/js/nav-dropdown.js"></script>
</body>
</html>
