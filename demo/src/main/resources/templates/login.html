<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>
    <form action="/login" method="post">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="/register">Register here</a></p>

    <!-- Error Modal -->
    <div id="errorModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:5px; max-width:400px;">
            <h2>Login Failed</h2>
            <p id="errorMessage"></p>
            <button onclick="closeErrorModal()">Try Again</button>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:5px; max-width:400px;">
            <h2>Success!</h2>
            <p id="successMessage"></p>
            <button onclick="closeSuccessModal()">Proceed</button>
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function closeErrorModal() {
            document.getElementById('errorModal').style.display = 'none';
            window.history.replaceState({}, document.title, '/login.html');
        }

        function closeSuccessModal() {
            document.getElementById('successModal').style.display = 'none';
            window.history.replaceState({}, document.title, '/login.html');
        }

        window.addEventListener('DOMContentLoaded', function() {
            const error = getQueryParam('error');
            const success = getQueryParam('success');

            if (error) {
                document.getElementById('errorMessage').textContent = decodeURIComponent(error);
                document.getElementById('errorModal').style.display = 'flex';
            } else if (success) {
                document.getElementById('successMessage').textContent = decodeURIComponent(success);
                document.getElementById('successModal').style.display = 'flex';
            }
        });

        window.addEventListener('click', function(event) {
            const errorModal = document.getElementById('errorModal');
            const successModal = document.getElementById('successModal');
            if (event.target === errorModal) {
                closeErrorModal();
            }
            if (event.target === successModal) {
                closeSuccessModal();
            }
        });
    </script>
</body>
</html>
