<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BoardGameBoard</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
<div class="page-shell">
    <main class="auth-card">
        <h1>Login</h1>
        <p class="muted">Welcome back to BoardGameBoard.</p>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="primary-button">Login</button>
        </form>

        <p class="small-link">
            Don't have an account? <a href="/register">Register here</a>
        </p>
    </main>
</div>

<div id="errorModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
        <h2>Login Failed</h2>
        <p id="errorMessage"></p>
        <button onclick="closeErrorModal()" class="primary-button">Try Again</button>
    </div>
</div>

<div id="successModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
        <h2>Success!</h2>
        <p id="successMessage"></p>
        <button onclick="closeSuccessModal()" class="primary-button">Proceed</button>
    </div>
</div>

<script>
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function closeErrorModal() {
        document.getElementById('errorModal').style.display = 'none';
        window.history.replaceState({}, document.title, '/login');
    }

    function closeSuccessModal() {
        document.getElementById('successModal').style.display = 'none';
        window.history.replaceState({}, document.title, '/login');
    }

    window.addEventListener('DOMContentLoaded', function() {
        const error = getQueryParam('error');
        const success = getQueryParam('success');

        if (error) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(error);
            document.getElementById('errorModal').style.display = 'flex';
        }

        if (success) {
            document.getElementById('successMessage').textContent = decodeURIComponent(success);
            document.getElementById('successModal').style.display = 'flex';
        }
    });
</script>
</body>
</html>
