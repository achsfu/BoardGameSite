<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BoardGameBoard</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
<div class="page-shell">
    <main class="auth-card">
        <h1>Create Account</h1>
        <p class="muted">Join BoardGameBoard and start tracking your favorite board games.</p>

        <form action="/register" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="role">Account Type</label>
                <select id="role" name="role" required>
                    <option value="PLAYER">Player</option>
                    <option value="ORGANIZER">Game Night Organizer</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" name="password2" minlength="6" required>
            </div>

            <button type="submit" class="primary-button">Register</button>
        </form>

        <p class="small-link">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </main>
</div>

<div id="errorModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
        <h2>Registration Failed</h2>
        <p id="errorMessage"></p>
        <button onclick="closeErrorModal()" class="primary-button">Try Again</button>
    </div>
</div>

<script>
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    function closeErrorModal() {
        document.getElementById('errorModal').style.display = 'none';
        window.history.replaceState({}, document.title, '/register');
    }

    window.addEventListener('DOMContentLoaded', function() {
        const error = getQueryParam('error');

        if (error) {
            document.getElementById('errorMessage').textContent = decodeURIComponent(error);
            document.getElementById('errorModal').style.display = 'flex';
        }
    });
</script>
</body>
</html>
