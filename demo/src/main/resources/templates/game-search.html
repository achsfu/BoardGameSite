<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${(query.isBlank() ? 'Game Search' : 'Search results for ' + query) + ' | BoardGameBoard'}">Game Search | BoardGameBoard</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
<div class="app-shell">
    <nav class="top-nav">
        <a href="/" class="brand">BoardGameBoard</a>

        <div class="nav-links">
            <a href="/dashboard" class="secondary-button">Dashboard</a>
            <a href="/profile" class="secondary-button">Profile</a>
        </div>
    </nav>

    <main class="dashboard game-detail-layout">
        <section class="hero-card">
            <p class="eyebrow">GAME SEARCH</p>
            <h1 th:text="${query.isBlank() ? 'Search board games' : 'Results for ' + query}">Search board games</h1>
            <p th:text="${query.isBlank() ? 'Type a board game name to find similar titles.' : 'We could not find an exact match, so here are similar games.'}">Type a board game name to find similar titles.</p>

            <form class="game-search-form" action="/games/search" method="get">
                <input type="search"
                       id="gameSearchBox"
                       name="q"
                       th:value="${query}"
                       placeholder="Search for a board game"
                       autocomplete="off"
                       required>
                <button type="submit" class="primary-button">Search</button>
            </form>
        </section>

        <section class="feature-card review-panel">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">SIMILAR GAMES</p>
                    <h2 th:text="${similarGames.isEmpty() ? 'No similar games found' : 'Games matching your search'}">Games matching your search</h2>
                </div>
            </div>

            <p class="muted" th:if="${similarGames.isEmpty()}">Try a different spelling or use a shorter search term.</p>

            <div class="grid" style="padding: 0; margin: 0; max-width: none; grid-template-columns: repeat(3, minmax(0, 1fr));">
                <div class="feature-card" th:each="game : ${similarGames}">
                    <h3 style="margin-top: 0;" th:text="${game.title}">Game Title</h3>
                    <p class="muted" th:text="${game.description != null ? game.description : 'No description available.'}">Description</p>
                    <a class="text-link" th:href="@{/games/{title}(title=${game.title})}">Open game page</a>
                </div>
            </div>

            <div class="search-pagination" th:if="${totalPages > 1}">
                <a class="secondary-button"
                   th:classappend="${currentPage == 1} ? ' disabled-pagination' : ''"
                   th:href="${currentPage == 1} ? '#' : @{/games/search(q=${query}, page=${currentPage - 1})}">
                    Previous
                </a>

                <form action="/games/search" method="get" class="page-selector-form">
                    <input type="hidden" name="q" th:value="${query}">
                    <label for="resultsPage">Page</label>
                    <select id="resultsPage" name="page" onchange="this.form.submit()">
                        <option th:each="pageNumber : ${#numbers.sequence(1, totalPages)}"
                                th:value="${pageNumber}"
                                th:text="'Page ' + ${pageNumber}"
                                th:selected="${pageNumber == currentPage}">Page 1</option>
                    </select>
                </form>

                <a class="secondary-button"
                   th:classappend="${currentPage == totalPages} ? ' disabled-pagination' : ''"
                   th:href="${currentPage == totalPages} ? '#' : @{/games/search(q=${query}, page=${currentPage + 1})}">
                    Next
                </a>
            </div>
        </section>
    </main>
</div>

<script src="/js/game-autocomplete.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', function () {
        attachGamePageSearch('gameSearchBox');
    });
</script>
</body>
</html>
