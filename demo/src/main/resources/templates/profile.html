<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile | BoardGameBoard</title>
    <link rel="stylesheet" th:href="@{/css/site.css}" href="/css/site.css" />
  </head>

  <body>
    <div class="app-shell">
      <nav class="top-nav">
        <a href="/" class="brand">BoardGameBoard</a>

        <div class="nav-links">
          <a href="/dashboard" class="secondary-button">Dashboard</a>

          <form action="/logout" method="post" style="display: inline">
            <button type="submit" class="secondary-button">Logout</button>
          </form>
        </div>
      </nav>

      <main class="dashboard">
        <section class="hero-card">
          <img
            th:src="${avatar}"
            src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150&q=80"
            alt="Avatar"
            style="
              width: 80px;
              height: 80px;
              border-radius: 50%;
              object-fit: cover;
              border: 2px solid #7c5cff;
            "
          />
          <form action="/profile" method="get" style="margin-bottom: 12px">
  <label for="sort">Sort Collection</label>

  <select name="sort" id="sort">
    <option value="added" th:selected="${sort == 'added'}">
      Recently Added
    </option>

    <option value="rating" th:selected="${sort == 'rating'}">
      Highest Rated
    </option>

    <option value="reviewed" th:selected="${sort == 'reviewed'}">
      Recently Reviewed
    </option>
  </select>

  <button type="submit" class="secondary-button">Sort</button>
</form>

          <div class="profile-edit-toggle-row">
            <button id="editCollectionToggle" type="button" class="secondary-button" aria-pressed="false">
              Edit Collection
            </button>
          </div>

          <div class="profile-lists-section">
            <div>
              <h3 style="margin: 0; font-size: 1rem">Games Owned</h3>

              <p
                class="muted"
                style="margin: 4px 0"
                th:if="${ownedItems.isEmpty()}"
              >
                No games added yet.
              </p>

              <div class="game-tag-container">
                <div
                  th:each="item : ${ownedItems}"
                  class="game-tag"
                  style="
                    display: flex;
                    align-items: center;
                    gap: 6px;
                    margin-bottom: 6px;
                  "
                >
                  <a th:href="@{/games/{title}(title=${item.gameName})}"><span th:text="${item.gameName}">Catan</span></a>

                  <form
                    action="/collection/move"
                    method="post"
                    class="collection-edit-only inline-collection-edit"
                    style="display: inline"
                    hidden
                  >
                    <input type="hidden" name="id" th:value="${item.id}" />
                    <input
                      type="hidden"
                      name="collectionType"
                      value="WISHLIST"
                    />

                    <button
                      type="submit"
                      class="secondary-button"
                      style="padding: 4px 8px"
                    >
                      Move to Wishlist
                    </button>
                  </form>

                  <form
                    action="/collection/remove"
                    method="post"
                    class="collection-edit-only inline-collection-edit"
                    style="display: inline"
                    hidden
                  >
                    <input type="hidden" name="id" th:value="${item.id}" />

                    <button
                      type="submit"
                      class="secondary-button"
                      style="padding: 4px 8px"
                    >
                      Remove
                    </button>
                  </form>
                </div>
              </div>
            </div>

            <div>
              <h3 style="margin: 0; font-size: 1rem">Wishlist</h3>

              <p
                class="muted"
                style="margin: 4px 0"
                th:if="${wishlistItems.isEmpty()}"
              >
                Wishlist is empty.
              </p>

              <div class="game-tag-container">
                <div
                  th:each="item : ${wishlistItems}"
                  class="game-tag wishlist-tag"
                  style="
                    display: flex;
                    align-items: center;
                    gap: 6px;
                    margin-bottom: 6px;
                  "
                >
                  <a th:href="@{/games/{title}(title=${item.gameName})}"><span th:text="${item.gameName}">Carcassonne</span></a>

                  <form
                    action="/collection/move"
                    method="post"
                    class="collection-edit-only inline-collection-edit"
                    style="display: inline"
                    hidden
                  >
                    <input type="hidden" name="id" th:value="${item.id}" />
                    <input
                      type="hidden"
                      name="collectionType"
                      value="OWNED"
                    />

                    <button
                      type="submit"
                      class="secondary-button"
                      style="padding: 4px 8px"
                    >
                      Move to Owned
                    </button>
                  </form>

                  <form
                    action="/collection/remove"
                    method="post"
                    class="collection-edit-only inline-collection-edit"
                    style="display: inline"
                    hidden
                  >
                    <input type="hidden" name="id" th:value="${item.id}" />

                    <button
                      type="submit"
                      class="secondary-button"
                      style="padding: 4px 8px"
                    >
                      Remove
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>

          <div>
            <p class="eyebrow" th:text="${role}">USER</p>
            <h1 th:text="${username} + '\'s Profile'">User's Profile</h1>
            <p class="muted profile-view-only" th:text="${bio}">No bio added yet!</p>

            <form action="/profile/update-bio" method="post" class="profile-edit-only profile-edit-inline-form" hidden>
              <div class="form-group">
                <label for="bio">Bio</label>

                <textarea
                  name="bio"
                  id="bio"
                  placeholder="Tell us about your favourite board games"
                  required
                  th:text="${bio == 'No bio added yet.' ? '' : bio}"
                ></textarea>
              </div>

              <div class="form-group" style="margin-top: 12px">
                <label for="profilePictureUrl">Profile Picture URL</label>

                <input
                  type="url"
                  name="profilePictureUrl"
                  id="profilePictureUrl"
                  placeholder="Paste a link"
                  th:value="${avatar.contains('unsplash.com') ? '' : avatar}"
                />
              </div>

              <button
                type="submit"
                class="primary-button"
                style="margin-top: 16px"
              >
                Save Profile Changes
              </button>
            </form>

            <div class="profile-edit-toggle-row">
              <button id="editProfileToggle" type="button" class="secondary-button" aria-pressed="false">
                Edit Profile
              </button>
            </div>

            <!--VIEW FOLLOWING AND FOLLOWED-->
            <div class="follow-stats" style="margin-top: 10px";>
              <a th:href="@{/profile/followers}" th:text="${followerCount} + ' Followers'" class="text-link"></a>
              <span style="margin: 0 10px;">·</span>
              <a th:href="@{/profile/following}" th:text="${followingCount} + ' Following'" class="text-link"></a>
            </div>

            <div class="collection-edit-only collection-add-section" hidden>
              <h2 style="margin-top: 28px">Add to Collection</h2>

              <form action="/collection/add" method="post">
                <div class="form-group">
                  <label for="ownedGames">Add Owned Game</label>

                  <input
                    type="text"
                    name="gameName"
                    id="ownedGames"
                    placeholder="Enter your game."
                    list="ownedGameSuggestions"
                    required
                  />

                  <datalist id="ownedGameSuggestions"></datalist>

                  <input
                    type="hidden"
                    name="collectionType"
                    value="OWNED"
                  />
                </div>

                <button
                  type="submit"
                  class="primary-button"
                  style="margin-top: 12px"
                >
                  Add to Owned
                </button>
              </form>

              <form
                action="/collection/add"
                method="post"
                style="margin-top: 20px"
              >
                <div class="form-group">
                  <label for="wishlistGames">Add Wishlist Game</label>

                  <input
                    type="text"
                    name="gameName"
                    id="wishlistGames"
                    placeholder="Enter your game."
                    list="wishlistGameSuggestions"
                    required
                  />

                  <datalist id="wishlistGameSuggestions"></datalist>

                  <input
                    type="hidden"
                    name="collectionType"
                    value="WISHLIST"
                  />
                </div>

                <button
                  type="submit"
                  class="primary-button"
                  style="margin-top: 12px"
                >
                  Add to Wishlist
                </button>
              </form>
            </div>
          </div>
        </section>

        <section class="grid profile-main-grid">
          <div class="feature-card profile-reviews-card">
            <h2>Posted Reviews</h2>

            <p class="muted" th:if="${reviews.isEmpty()}">
              You haven't shared any reviews yet!
            </p>

            <div
              th:each="review : ${reviews}"
              class="mock-card"
              style="margin-bottom: 16px; padding: 18px"
            >
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  align-items: baseline;
                "
              >
                <h3 style="margin: 0">
                  <a th:if="${review.gameTitle != null}" th:href="@{/games/{title}(title=${review.gameTitle})}" th:text="${review.gameTitle}">Game Title</a>
                  <span th:if="${review.gameTitle == null}">Game Title</span>
                </h3>

                <span
                  class="eyebrow"
                  th:text="${review.rating} + ' / 5'"
                >
                  5 / 5
                </span>
              </div>

              <p
                style="margin: 10px 0 0"
                th:text="${review.reviewText}"
              >
                Review details
              </p>

              <form
                class="profile-edit-only"
                th:action="@{/reviews/{id}/delete(id=${review.id})}"
                method="post"
                onsubmit="return confirm('Delete this review?');"
                hidden
              >
                <button type="submit" class="danger-button small-button" style="margin-top: 10px">
                  Delete Review
                </button>
              </form>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/game-autocomplete.js"></script>

    <script>
      window.addEventListener('DOMContentLoaded', function () {
        var pageBody = document.body;
        var editCollectionButton = document.getElementById('editCollectionToggle');
        var editToggleButton = document.getElementById('editProfileToggle');
        var collectionEditElements = document.querySelectorAll('.collection-edit-only');
        var profileEditElements = document.querySelectorAll('.profile-edit-only');
        var isCollectionEditing = false;
        var isProfileEditing = false;

        function applyCollectionEditingState() {
          collectionEditElements.forEach(function (element) {
            element.hidden = !isCollectionEditing;
          });

          if (pageBody) {
            pageBody.classList.toggle('is-collection-editing', isCollectionEditing);
          }

          if (editCollectionButton) {
            editCollectionButton.textContent = isCollectionEditing ? 'Done Collection Editing' : 'Edit Collection';
            editCollectionButton.setAttribute('aria-pressed', String(isCollectionEditing));
            editCollectionButton.classList.toggle('primary-button', isCollectionEditing);
            editCollectionButton.classList.toggle('secondary-button', !isCollectionEditing);
          }
        }

        function applyProfileEditingState() {
          profileEditElements.forEach(function (element) {
            element.hidden = !isProfileEditing;
          });

          if (pageBody) {
            pageBody.classList.toggle('is-profile-editing', isProfileEditing);
          }

          if (editToggleButton) {
            editToggleButton.textContent = isProfileEditing ? 'Done Profile Editing' : 'Edit Profile';
            editToggleButton.setAttribute('aria-pressed', String(isProfileEditing));
            editToggleButton.classList.toggle('primary-button', isProfileEditing);
            editToggleButton.classList.toggle('secondary-button', !isProfileEditing);
          }
        }

        if (editCollectionButton) {
          editCollectionButton.addEventListener('click', function () {
            isCollectionEditing = !isCollectionEditing;
            applyCollectionEditingState();
          });
        }

        if (editToggleButton) {
          editToggleButton.addEventListener('click', function () {
            isProfileEditing = !isProfileEditing;
            applyProfileEditingState();
          });
        }

        applyCollectionEditingState();
        applyProfileEditingState();
        attachGameAutocomplete('ownedGames', 'ownedGameSuggestions');
        attachGameAutocomplete('wishlistGames', 'wishlistGameSuggestions');
      });
    </script>
  </body>
</html>
