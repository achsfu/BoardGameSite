<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${listTitle} + ' | BoardGameBoard'">Connections | BoardGameBoard</title>
    <link rel="stylesheet" th:href="@{/css/site.css}" href="/css/site.css">
</head>
<body class="dashboard-body">

<div class="dashboard-shell">
    <nav class="dashboard-nav">
        <a href="/" class="dashboard-brand">BoardGameBoard</a>

        <div class="dashboard-nav-links">
            <a href="/dashboard" th:if="${session.AUTH_USER != null}">Dashboard</a>

            <form class="dashboard-nav-search" action="/profile/search" method="get" th:if="${session.AUTH_USER != null}">
                <button type="button" class="dashboard-nav-search-toggle">Users</button>
                <input id="navUserSearch" name="q" type="search" placeholder="Search users" required>
                <button type="submit">Search</button>
            </form>

            <form class="dashboard-nav-search" action="/games/search" method="get" th:if="${session.AUTH_USER != null}">
                <button type="button" class="dashboard-nav-search-toggle">Games</button>
                <input id="navGameSearch" name="q" type="search" placeholder="Search games" required>
                <button type="submit">Search</button>
            </form>

            <form action="/logout" method="post" th:if="${session.AUTH_USER != null}">
                <button type="submit" class="dashboard-logout-button">Logout</button>
            </form>

            <a href="/login" th:if="${session.AUTH_USER == null}">Sign in</a>
            <a href="/register" th:if="${session.AUTH_USER == null}">Register</a>
        </div>
    </nav>

    <main class="dashboard game-detail-layout">
        <section class="hero-card">
            <p class="eyebrow">SOCIAL</p>
            <h1 th:text="${listTitle}">Connections</h1>
            <p th:text="${listTitle == 'Following'
                ? (connections.size() == 1
                    ? 'You are following 1 account'
                    : 'You are following ' + connections.size() + ' accounts')
                : (connections.size() == 1
                    ? 'You have 1 account following you'
                    : 'You have ' + connections.size() + ' accounts following you')}">Manage your connections.</p>

            <div style="margin-top: 12px;">
                <a th:href="@{/profile}" class="secondary-button">Back to your profile</a>
            </div>
        </section>

        <section class="feature-card review-panel">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">LIST</p>
                    <h2 th:text="${connections.isEmpty() ? 'No connections found' : listTitle + ' list'}">Connections list</h2>
                </div>
            </div>

            <p class="muted" th:if="${connections.isEmpty()}">No one here yet.</p>

            <div class="grid" style="padding: 0; margin: 0; max-width: none; grid-template-columns: repeat(3, minmax(0, 1fr));" th:if="${!connections.isEmpty()}">
                <div class="feature-card" th:each="person : ${connections}">
                    <h3 style="margin-top: 0;" th:text="${person.username}">Username</h3>
                    <a class="text-link" th:href="@{'/profile/' + ${person.username}}">Open profile</a>
                </div>
            </div>
        </section>
    </main>
</div>

    <script src="/js/nav-dropdown.js"></script>
</body>
</html>
